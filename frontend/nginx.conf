server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large PDF uploads to reach the backend.
    client_max_body_size 100m;

    # API reverse-proxy: browser calls same-origin /api/* → backend container.
    # The API key travels in the X-API-Key header; the backend stays internal.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SPA fallback: client-side routing (react-router) resolves unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
