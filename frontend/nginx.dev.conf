# Local-testing nginx: same as production but proxies /api to the backend
# running on the host (uvicorn on :8010) instead of the compose `api` service.
# Used only for `docker run` local smoke tests, mounted over default.conf.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://host.docker.internal:8010/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
